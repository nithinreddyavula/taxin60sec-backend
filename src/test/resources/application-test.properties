spring.datasource.url=jdbc:h2:mem:tax60-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

storage.location=storage
storage.max-file-size=10485760

tax60.cors.allowed-origins=http://localhost:3000
tax60.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
tax60.cors.allowed-headers=*
